# 1claw.net — Nginx Configuration
# HTTP → HTTPS redirect + SSL termination
# Place in /etc/nginx/sites-available/1claw.net.conf
# Enable: ln -sf /etc/nginx/sites-available/1claw.net.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name 1claw.net;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 1claw.net;

    ssl_certificate     /etc/nginx/ssl/1claw.net.cer;
    ssl_certificate_key /etc/nginx/ssl/1claw.net.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        root /usr/share/nginx/html/1claw.net;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
