# 1claw.net — Nginx Configuration
# HTTP → HTTPS redirect + SSL termination
# Language detection: Chinese visitors → /zh/, English default
# Place in /etc/nginx/sites-available/1claw.net.conf
# Enable: ln -sf /etc/nginx/sites-available/1claw.net.conf /etc/nginx/sites-enabled/

# Map Accept-Language to language path
map $http_accept_language $lang {
    default       "";
    ~*^zh        /zh;
}

server {
    listen 80;
    listen [::]:80;
    server_name 1claw.net;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 1claw.net;

    ssl_certificate     /etc/nginx/ssl/1claw.net.cer;
    ssl_certificate_key /etc/nginx/ssl/1claw.net.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html/1claw.net;

    # Chinese language detection — redirect to /zh/
    # Only redirect exact / (not /zh/* already visited)
    location = / {
        if ($lang) {
            return 302 $lang/;
        }
        index index.html;
        try_files /index.html =404;
    }

    location /zh/ {
        index index.html;
        try_files $uri $uri/ /zh/index.html;
    }

    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
